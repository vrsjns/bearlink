apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: bearlink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-service
  template:
    metadata:
      labels:
        app: audit-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16
          command:
            - sh
            - -c
            - until pg_isready -h postgres -U postgres; do echo "waiting for postgres..."; sleep 2; done
      containers:
        - name: audit-service
          image: audit-service:latest
          ports:
            - containerPort: 8500
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bearlink-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: 'postgresql://postgres:$(POSTGRES_PASSWORD)@postgres:5432/audit_service'
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bearlink-secrets
                  key: JWT_SECRET
            - name: AUDIT_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: bearlink-secrets
                  key: AUDIT_INTERNAL_SECRET
          resources:
            requests:
              memory: '64Mi'
              cpu: '50m'
            limits:
              memory: '256Mi'
              cpu: '200m'
          readinessProbe:
            httpGet:
              path: /health
              port: 8500
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8500
            initialDelaySeconds: 30
            periodSeconds: 15
